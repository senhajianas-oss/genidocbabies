<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        const host = window.location.hostname;
        const path = window.location.pathname.replace('/', '');
        const search = window.location.search;

        if (host.includes('genidochayat.ma')) {
            let targetUrl = "https://genidoc.ma/scan.html";

            if (search) {
                // Si l'id est en paramètre (?id=1)
                window.location.href = targetUrl + search;
            } else if (path && path.length > 2) {
                // Si l'id est dans le chemin (/V8H5CLPX)
                window.location.href = targetUrl + "?token=" + path;
            } else {
                // Cas par défaut pour votre carte de TEST (Anas Senhaji ID=1)
                window.location.href = targetUrl + "?id=1";
            }
        } else {
            window.location.href = "/auth/login.html";
        }
    </script>
</head>

<body>
    Redirection en cours...
</body>

</html>
