<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Connexion à GeniDoc Babies – Plateforme de suivi pédiatrique." />
    <title>Connexion – GeniDoc Babies</title>
    <link rel="stylesheet" href="/assets/auth.css" />
</head>

<body class="has-header">
    <header class="page-header">
        <img src="/static/Hayat.svg" alt="Logo GeniDoc" class="page-header__logo" />
        <div class="page-header__divider"></div>
        <span class="page-header__title">GeniDoc — Connexion</span>
    </header>

    <div class="auth-card">
        <div class="auth-tabs">
            <a href="login.html" class="auth-tab active">
                <span class="tab-icon"></span> Login
            </a>
            <a href="signup.html" class="auth-tab">
                <span class="tab-icon"></span> Sign Up
            </a>
        </div>

        <div id="login-alert" class="alert alert-error" style="display:none;">
            <span class="alert-icon"><img src="/static/warning.png" class="emoji-icon" alt="⚠️"></span>
            <span id="login-alert-msg"></span>
        </div>

        <form id="login-form" autocomplete="on" novalidate>

            <div class="form-group">
                <label for="login-email">Email address</label>
                <input type="email" id="login-email" name="email" placeholder="Enter your email address"
                    autocomplete="email" required />
            </div>

            <!-- Password -->
            <div class="form-group">
                <div class="form-label-row">
                    <label for="login-password">Password</label>
                    <a href="forgot-password.html">Forgot password?</a>
                </div>
                <div class="input-wrap">
                    <input type="password" id="login-password" name="password" placeholder="Enter your password"
                        autocomplete="current-password" required />
                    <button type="button" class="toggle-pw" onclick="togglePw('login-password',this)"
                        aria-label="Show password">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="login-btn">Log In</button>
        </form>

        <div class="divider"><span>OR</span></div>

        <button type="button" class="btn-social">
            <span class="social-icon">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" />
                </svg>
            </span>
            Continue with Apple
        </button>

        <p class="auth-footer">
            Don't have an account yet? <a href="signup.html">Sign up</a>
        </p>
    </div>

    <script src="../js/api.js"></script>
    <script>
        function togglePw(id, btn) {
            const inp = document.getElementById(id);
            const isHidden = inp.type === 'password';
            inp.type = isHidden ? 'text' : 'password';
            btn.innerHTML = isHidden
                ? '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
                : '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const alertBox = document.getElementById('login-alert');
            const alertMsg = document.getElementById('login-alert-msg');
            const btn = document.getElementById('login-btn');

            if (!email || !password) {
                alertBox.style.display = 'flex'; alertMsg.textContent = 'Please fill in all fields.'; return;
            }

            btn.textContent = 'Logging in…'; btn.disabled = true;
            try {
                const data = await window.genidocApi.login(email, password);
                if (data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    alertBox.style.display = 'none';

                    const role = data.user.role;
                    const onb = data.onboarding || {};

                    const params = new URLSearchParams(window.location.search);
                    const returnUrl = params.get('returnUrl');

                    if (returnUrl) {
                        window.location.href = returnUrl;
                        return;
                    }

                    if (onb.is_completed) {
                        if (role === 'ADMIN') window.location.href = '../dashboard/admin/index.html';
                        else if (role === 'PEDIATRE') window.location.href = '../dashboard/pediatre/index.html';
                        else window.location.href = '../dashboard/tuteur/index.html';
                    } else {
                        if (role === 'ADMIN') window.location.href = '../onboarding/admin/step1-organisation.html';
                        else if (role === 'TUTEUR') window.location.href = '../onboarding/tuteur/step1-profile.html';
                        else window.location.href = '../onboarding/pediatre/step1-profil.html';
                    }
                }
            } catch (err) {
                alertBox.style.display = 'flex';
                alertMsg.textContent = err.message || 'Server connection error.';
            } finally {
                btn.textContent = 'Log In'; btn.disabled = false;
            }
        });
    </script>
</body>

</html>
