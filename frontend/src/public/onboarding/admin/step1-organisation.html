<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding Admin - Étape 1</title>
  <link rel="stylesheet" href="../tuteur/step1-profil.css" />
</head>

<body>
  <header class="page-header">
    <img src="/static/Hayat.svg" alt="Logo GeniDoc" class="page-header__logo" />
    <div class="page-header__divider"></div>
    <h1 class="page-header__title">Admin — Étape 1/3</h1>
  </header>

  <div class="dashboard">
    <aside class="sidebar">
      <section class="info-section">
        <div class="info-row">
          <span id="genidoc_id1">Rôle :</span>
          <span>Admin</span>
        </div>
        <div class="info-row">
          <span id="genidoc_id1">Nom :</span>
          <span id="admin_nom_value">...</span>
        </div>
        <div class="info-row">
          <span id="genidoc_id1">Statut :</span>
          <span>Configuration</span>
        </div>
      </section>

      <hr class="separateur sep2" />

      <nav class="menu">
        <a href="#" aria-current="page">Étape 1 — Organisation</a>
        <a href="step2-documents-regles.html" class="disabled-link" tabindex="-1" aria-disabled="true">Étape 2 — Règles
          & docs</a>
        <a href="step3-gestion-medecins.html" class="disabled-link" tabindex="-1" aria-disabled="true">Étape 3 — Gestion
          médecins</a>
      </nav>

      <div class="langue">
        <span class="langue-icon"><img src="/static/world.png" alt="" class="genidoc_world"></span>
        <select aria-label="Langue">
          <option value="fr" selected>FR</option>
          <option value="ar">AR</option>
          <option value="en">EN</option>
        </select>
      </div>
    </aside>

    <main class="content">
      <section class="form-card">
        <div class="form-card__header">
          <div class="form-card__kpi">
            <span class="badge">1</span>
            <span class="form-card__title">Organisation</span>
          </div>
          <div class="form-card__subtitle">
            Renseigne les informations de l’organisme que tu vas gérer.
          </div>
        </div>

        <form class="genidoc-form" id="admin-step1-form" action="#" method="post" novalidate>
          <div class="section-title">Informations générales</div>

          <div class="form-grid">
            <div class="form-field form-field--full">
              <label for="org_nom">Nom de l’organisme *</label>
              <input type="text" id="org_nom" name="org_nom" placeholder="Ex: Clinique X" required />
            </div>

            <div class="form-field">
              <label for="org_type">Type *</label>
              <select id="org_type" name="org_type" required>
                <option value="" selected disabled>Choisir</option>
                <option value="CLINIQUE">Clinique</option>
                <option value="HOPITAL">Hôpital</option>
                <option value="CENTRE">Centre</option>
                <option value="RESEAU">Réseau</option>
              </select>
            </div>

            <div class="form-field">
              <label for="org_ville">Ville *</label>
              <input type="text" id="org_ville" name="org_ville" placeholder="Ex: Casablanca" required />
            </div>

            <div class="form-field form-field--full">
              <label for="org_adresse">Adresse</label>
              <input type="text" id="org_adresse" name="org_adresse" placeholder="Rue, quartier..." />
            </div>

            <div class="form-field">
              <label for="org_telephone">Téléphone</label>
              <input type="tel" id="org_telephone" name="org_telephone" placeholder="Optionnel" />
            </div>

            <div class="form-field">
              <label for="org_email">Email organisme</label>
              <input type="email" id="org_email" name="org_email" placeholder="Optionnel" />
            </div>
          </div>

          <div class="form-divider"></div>

          <div class="checkbox-row">
            <input type="checkbox" id="org_confirm" name="org_confirm" required />
            <label for="org_confirm">
              Je confirme que je suis autorisé à gérer cet organisme *
            </label>
          </div>

          <div class="form-actions">
            <button type="submit" class="card__btn">Enregistrer et continuer</button>
          </div>
        </form>
      </section>
    </main>
  </div>
  </div>
  <script src="../../js/api.js"></script>
  <script src="../../js/shared.js"></script>
  <script>
    const form = document.getElementById("admin-step1-form");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const org_confirm = document.getElementById("org_confirm").checked;
      if (!org_confirm) {
        alert("Tu dois confirmer que tu es autorisé à gérer cet organisme.");
        return;
      }

      const payload = {
        org_nom: document.getElementById("org_nom").value.trim(),
        org_type: document.getElementById("org_type").value,
        org_ville: document.getElementById("org_ville").value.trim(),
        org_adresse: document.getElementById("org_adresse").value.trim() || null,
        org_telephone: document.getElementById("org_telephone").value.trim() || null,
        org_email: document.getElementById("org_email").value.trim() || null,
        validation_mode: "OBLIGATOIRE"
      };

      const btn = form.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = "Envoi...";

      try {
        const data = await window.genidocApi.admin.step1(payload);
        if (data.organisation && data.organisation.org_code) {
          localStorage.setItem('org_code', data.organisation.org_code);
        }
        window.location.href = data.next_route || "step2-documents-regles.html";
      } catch (err) {
        alert('Erreur : ' + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "Enregistrer et continuer";
      }
    });
  </script>
</body>

</html>
