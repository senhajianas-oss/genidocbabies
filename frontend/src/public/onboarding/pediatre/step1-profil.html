<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onboarding Pédiatre - Étape 1</title>
  <link rel="stylesheet" href="../tuteur/step1-profil.css" />
</head>

<body>
  <header class="page-header">
    <img src="/static/Hayat.svg" alt="Logo GeniDoc" class="page-header__logo" />
    <div class="page-header__divider"></div>
    <h1 class="page-header__title">Pédiatre — Étape 1/3</h1>
  </header>

  <div class="dashboard">
    <aside class="sidebar">
      <section class="info-section">
        <div class="info-row">
          <span id="genidoc_id1">Rôle :</span>
          <span>Pédiatre</span>
        </div>
        <div class="info-row">
          <span id="genidoc_id1">Statut :</span>
          <span>Profil à compléter</span>
        </div>
      </section>

      <hr class="separateur sep2" />

      <nav class="menu">
        <a href="#" aria-current="page">Étape 1 — Profil</a>
        <a href="#" class="disabled-link" tabindex="-1" aria-disabled="true">Étape 2 — Documents</a>
        <a href="#" class="disabled-link" tabindex="-1" aria-disabled="true">Étape 3 — Statut</a>
      </nav>

      <div class="langue">
        <span class="langue-icon">🌐</span>
        <select aria-label="Langue">
          <option value="fr" selected>FR</option>
          <option value="ar">AR</option>
          <option value="en">EN</option>
        </select>
      </div>
    </aside>

    <main class="content">
      <section class="form-card">
        <div class="form-card__header">
          <div class="form-card__kpi">
            <span class="badge">1</span>
            <span class="form-card__title">Informations professionnelles</span>
          </div>
          <div class="form-card__subtitle">
            Renseigne les informations de base pour continuer.
          </div>
        </div>

        <form class="genidoc-form" action="#" method="post" novalidate>
          <div class="section-title">Identité professionnelle</div>

          <div class="form-grid">
            <div class="form-field">
              <label for="numero_ordre">Numéro d’ordre *</label>
              <input type="text" id="numero_ordre" name="numero_ordre" placeholder="Ex: 12345" required />
            </div>

            <div class="form-field">
              <label for="telephone_pro">Téléphone pro *</label>
              <input type="tel" id="telephone_pro" name="telephone_pro" placeholder="Ex: 06XXXXXXXX" required />
            </div>

            <div class="form-field">
              <label for="specialite">Spécialité</label>
              <input type="text" id="specialite" name="specialite" placeholder="Optionnel" />
            </div>

            <div class="form-field">
              <label for="type_structure">Structure *</label>
              <select id="type_structure" name="type_structure" required>
                <option value="" selected disabled>Choisir</option>
                <option value="CABINET">Cabinet</option>
                <option value="HOPITAL">Hôpital</option>
                <option value="CLINIQUE">Clinique</option>
                <option value="CENTRE">Centre de santé</option>
              </select>
            </div>

            <div class="form-field form-field--full">
              <label for="nom_structure">Nom de la structure</label>
              <input type="text" id="nom_structure" name="nom_structure" placeholder="Optionnel" />
            </div>

            <div class="form-field">
              <label for="ville">Ville *</label>
              <input type="text" id="ville" name="ville" placeholder="Ex: Casablanca" required />
            </div>

            <div class="form-field">
              <label for="email_pro">Email pro</label>
              <input type="email" id="email_pro" name="email_pro" placeholder="Optionnel" />
            </div>

            <div class="form-field form-field--full">
              <label for="adresse">Adresse</label>
              <input type="text" id="adresse" name="adresse" placeholder="Rue, quartier..." />
            </div>
          </div>

          <div class="form-divider"></div>

          <div class="checkbox-row">
            <input type="checkbox" id="consent" name="consent" required />
            <label for="consent">
              Je confirme que ces informations sont exactes *
            </label>
          </div>

          <div class="form-actions">
            <button type="submit" class="card__btn">Enregistrer et continuer</button>
          </div>
        </form>
      </section>
    </main>
  </div>
  <script src="../../js/api.js"></script>
  <script src="../../js/shared.js"></script>
  <script>
    document.querySelector('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const btn = form.querySelector('button');

      const formData = {
        numero_ordre: document.getElementById('numero_ordre').value,
        telephone_pro: document.getElementById('telephone_pro').value,
        specialite: document.getElementById('specialite').value,
        type_structure: document.getElementById('type_structure').value,
        nom_structure: document.getElementById('nom_structure').value,
        ville: document.getElementById('ville').value,
        email_pro: document.getElementById('email_pro').value,
        adresse: document.getElementById('adresse').value
      };

      btn.textContent = 'Enregistrement...'; btn.disabled = true;
      try {
        const res = await window.genidocApi.pediatre.step1(formData);
        window.location.href = './step2-documents.html';
      } catch (err) {
        alert('Erreur : ' + err.message);
      } finally {
        btn.textContent = "Enregistrer et continuer"; btn.disabled = false;
      }
    });
  </script>
</body>

</html>
