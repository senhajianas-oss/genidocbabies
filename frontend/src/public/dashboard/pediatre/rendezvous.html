<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rendez-vous — Pédiatre GeniDoc</title>
    <meta name="description" content="Gestion des rendez-vous du pédiatre GeniDoc." />
    <link rel="stylesheet" href="../../onboarding/tuteur/step1-profil.css" />
</head>

<body>
    <header class="page-header">
        <img src="/static/Hayat.svg" alt="Logo GeniDoc" class="page-header__logo" />
        <div class="page-header__divider"></div>
        <h1 class="page-header__title">Pédiatre — Rendez-vous</h1>
    </header>


    <div class="dashboard">
        <aside class="sidebar">
            <section class="info-section">
                <div class="info-row">
                    <span>Nom :</span>
                    <span>—</span>
                </div>
                <div class="info-row">
                    <span>Rôle :</span>
                    <span>Pédiatre</span>
                </div>
            </section>

            <hr class="separateur sep2" />

            <nav class="menu">
                <a href="./index.html">Dashboard</a>
                <a href="./patients.html">Mes patients</a>
                <a href="./rendezvous.html" aria-current="page">Rendez-vous</a>
                <a href="./dossiers.html">Dossiers médicaux</a>
                <a href="./profil.html">Mon profil</a>
                <a href="./settings.html">Paramètres</a>
                <a href="../../auth/login.html">Déconnexion</a>
            </nav>

            <div class="langue">
                <span class="langue-icon">🌐</span>
                <select aria-label="Langue">
                    <option value="fr" selected>FR</option>
                    <option value="ar">AR</option>
                    <option value="en">EN</option>
                </select>
            </div>
        </aside>

        <main class="content">
            <section class="form-card">
                <div class="form-card__header">
                    <div class="form-card__kpi">
                        <span class="badge">🗓️</span>
                        <span class="form-card__title">Rendez-vous</span>
                    </div>
                    <div class="form-card__subtitle">
                        Consultez et gérez votre agenda du jour.
                    </div>
                </div>

                <div class="genidoc-form">
                    <div class="section-title">Créer un rendez-vous</div>

                    <form action="#" method="post">
                        <div class="form-grid">
                            <div class="form-field">
                                <label for="rdv_patient">Patient *</label>
                                <input type="text" id="rdv_patient" name="rdv_patient" placeholder="Nom du patient"
                                    required />
                            </div>
                            <div class="form-field">
                                <label for="rdv_date">Date *</label>
                                <input type="date" id="rdv_date" name="rdv_date" required />
                            </div>
                            <div class="form-field">
                                <label for="rdv_heure">Heure *</label>
                                <input type="time" id="rdv_heure" name="rdv_heure" required />
                            </div>
                            <div class="form-field">
                                <label for="rdv_motif">Motif</label>
                                <input type="text" id="rdv_motif" name="rdv_motif"
                                    placeholder="Ex: Consultation générale" />
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="submit" class="card__btn">Enregistrer le RDV</button>
                        </div>
                    </form>

                    <div class="form-divider"></div>

                    <div class="section-title">Rendez-vous à venir</div>

                    <div class="hint-box">
                        Aucun rendez-vous planifié. Créez en un ci-dessus pour commencer.
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>

</html>
