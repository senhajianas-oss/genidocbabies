<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paramètres — Admin GeniDoc</title>
    <meta name="description" content="Paramètres du compte administrateur GeniDoc." />
    <link rel="stylesheet" href="../../onboarding/tuteur/step1-profil.css" />
</head>

<body>
    <header class="page-header">
        <img src="/static/Hayat.svg" alt="Logo GeniDoc" class="page-header__logo" />
        <div class="page-header__divider"></div>
        <h1 class="page-header__title">Admin — Paramètres</h1>
    </header>


    <div class="dashboard">
        <aside class="sidebar">
            <section class="info-section">
                <div class="info-row"><span>Organisation :</span><span>—</span></div>
                <div class="info-row"><span>Rôle :</span><span>Admin</span></div>
            </section>
            <hr class="separateur sep2" />
            <nav class="menu">
                <a href="./index.html">Dashboard</a>
                <a href="./pediatres-validation.html">Validation pédiatres</a>
                <a href="./medecins.html">Médecins</a>
                <a href="./organisation.html">Organisation</a>
                <a href="./rapports.html">Rapports</a>
                <a href="./settings.html" aria-current="page">Paramètres</a>
                <a href="../../auth/login.html">Déconnexion</a>
            </nav>
            <div class="langue">
                <span class="langue-icon"><img src="/static/world.png" class="emoji-icon" alt="Langue"></span>
                <select aria-label="Langue">
                    <option value="fr" selected>FR</option>
                    <option value="ar">AR</option>
                    <option value="en">EN</option>
                </select>
            </div>
        </aside>

        <main class="content">
            <section class="form-card">
                <div class="form-card__header">
                    <div class="form-card__kpi">
                        <span class="badge"><img src="/static/settings-2.svg" class="emoji-icon"
                                alt="Settings"></span>
                        <span class="form-card__title">Paramètres admin</span>
                    </div>
                    <div class="form-card__subtitle">Sécurité + préférences.</div>
                </div>

                <form class="genidoc-form" action="#" method="post" novalidate>
                    <div class="section-title">Changer mot de passe</div>

                    <div class="form-grid">
                        <div class="form-field form-field--full">
                            <label for="old_password">Ancien mot de passe *</label>
                            <input id="old_password" name="old_password" type="password" required />
                        </div>
                        <div class="form-field">
                            <label for="new_password">Nouveau *</label>
                            <input id="new_password" name="new_password" type="password" required />
                        </div>
                        <div class="form-field">
                            <label for="confirm_password">Confirmer *</label>
                            <input id="confirm_password" name="confirm_password" type="password" required />
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="card__btn">Mettre à jour</button>
                    </div>

                    <div class="form-divider"></div>

                    <div class="section-title">Préférences</div>

                    <div class="checkbox-row">
                        <input type="checkbox" id="notif_validation" name="notif_validation" />
                        <label for="notif_validation">Notifications validation pédiatres</label>
                    </div>

                    <div class="checkbox-row">
                        <input type="checkbox" id="notif_exports" name="notif_exports" />
                        <label for="notif_exports">Notifications exports</label>
                    </div>

                    <div class="form-divider"></div>

                    <div class="section-title">Compte</div>

                    <div class="hint-box">
                        La suppression d'un compte admin doit être validée (sécurité).
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn-secondary">Demander suppression</button>
                    </div>
                </form>
            </section>
        </main>
    </div>
</body>

</html>
